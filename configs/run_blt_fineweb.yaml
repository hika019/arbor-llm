# BLT × BitLinear, FineWeb-Edu streaming, 8bit Adam の本走 mini.
# 1B 本走に向けたパラメータ感の確認用 (200 step).
run_name: blt_fineweb_mini
seed: 42

model:
  backend: blt
  vocab_size: 260
  hidden_size: 256
  intermediate_size: 512
  num_hidden_layers: 4
  num_local_layers: 1
  num_attention_heads: 8
  num_key_value_heads: 8
  max_position_embeddings: 256
  patch_size: 4
  patching_mode: space
  rope_theta: 10000.0
  use_flash_attention: false
  gradient_checkpointing: false
  bitlinear_in_global: true
  fp_in_local: true

data:
  source: "HuggingFaceFW/fineweb-edu"
  streaming: true
  shuffle_buffer: 1000
  context_length: 256
  num_workers: 0          # streaming + worker は今は単一プロセスで
  pin_memory: true
  micro_batch_size: 8
  text_column: text

optim:
  optimizer: bnb_adamw_8bit  # 8bit Adam (state を 1/4)
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 20
  total_steps: 200

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true        # bench: compile=default で 33k→59k tok/s (1.8x) & VRAM減. 動作確認済
  compile_mode: default      # 初回のみコンパイルで数分待ち. 不安定なら false に戻す
  micro_batch_size: 8        # bench: compile=default bs=8 で 59.6k tok/s / 11.1GB
  grad_accum_steps: 1
  flash_attention: false
  fused_rmsnorm: false
  fused_swiglu: false

checkpoint:
  dir: ./checkpoints/blt_fineweb_mini
  save_every_steps: 50
  keep_last_k: 2
  keep_every_n_steps: null
  async_save: true           # I/O を学習スレッドから外す

logging:
  wandb_project: arbor-llm
  log_every_steps: 10
  throughput_window: 20
