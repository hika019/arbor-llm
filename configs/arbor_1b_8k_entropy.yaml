# Arbor v2 1B / 8192 bytes 本走の entropy patching 版 (BLT 本命方式)
#
# 前提: configs/entropy_lm.yaml の ByteLM 学習が完了していること
#       (checkpoints/entropy_lm/final = step 50000, train EMA ~1.1 nats/byte)。
# 新規:   python -m src.train.train --config configs/arbor_1b_8k_entropy.yaml
# 再開:   python -m src.train.train --config configs/arbor_1b_8k_entropy.yaml --resume latest
#
# static 版 (arbor_1b_8k.yaml) との違いは patching のみ。threshold 2.0 で
# 平均 patch 長は混合加重 ~4.3 bytes (実測) と static の 4 bytes とほぼ等価だが、
# 動的モードは patch 数を max_bytes / min_patch_len = 4096 に固定 pad するため
# global 層の系列長は static (2048) の 2 倍になる (pad patch は decoder から
# gather されず勾配も流れないが、計算自体は走る)。速度が厳しければ
# min_patch_len: 4 (= global 2048, ただし 4 bytes 未満で区切れなくなる) が次の手。
#
# 実測 (RTX 4090 / WSL2, 窓 attention + compile ON, micro 1):
#   25.2k tok/s / peak VRAM 16.4GiB → 200k steps ≈ 48 日
# 注: torch_compile と gradient_checkpointing の併用は torch 2.5 で backward が
# NaN になるため train.py が起動時に弾く。OOM 時は compile を犠牲にして
# gradient_checkpointing: true + torch_compile: false (7.8k tok/s) にする。

run_name: arbor2_1b_8k_entropy
seed: 42

model:
  vocab_size: 260               # 256 bytes + 特殊 4 (BOE/BOS/EOS/PAD)
  patching_mode: entropy        # choices: static | space | entropy
  min_patch_len: 2              # これ未満では区切らない (max_patches = 8192/2 = 4096)
  max_patch_len: 16             # これに達したら強制区切り
  entropy_threshold: 2.0        # 次バイト H (nats)。混合加重で平均 ~4.3 bytes/patch
  entropy_model:                # ByteLM の構成 (entropy_lm.yaml の model 節と一致させる)
    vocab_size: 260
    max_bytes: 32768
    hidden_size: 512
    num_heads: 8
    num_kv_heads: 4
    intermediate_size: 1536
    num_hidden_layers: 6
    rope_theta: 10000.0
    bitnet: false
  entropy_model_ckpt: ./checkpoints/entropy_lm/final   # 初回構築時に重みを読む (凍結同梱)
  max_bytes: 8192               # 学習 context (bytes)
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4               # GQA
  intermediate_size: 5632       # ReLU² gated FFN
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 500000.0
  norm_eps: 1.0e-5
  bitnet: true
  gradient_checkpointing: false # OOM 時のみ true

# ---- データ: static 版と同一混合 (ByteLM はこの上位集合で学習済み) ----
data:
  sources:
    # ---- 日本語 0.60 ----
    - path: "HuggingFaceFW/fineweb-2"   # 日本語 web
      name: "jpn_Jpan"
      weight: 0.57
    - path: "y2lan/japan-law"           # 法令 (条文体。小規模だが all_exhausted で循環)
      text_column: "body"
      weight: 0.03
    # ---- 英語 0.17 ----
    - path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      weight: 0.13
    - path: "vblagoje/cc_news"          # 英語 news
      weight: 0.04
    # ---- code / math 0.23 ----
    - path: "HuggingFaceTB/finemath"    # 数学 (web 由来, 高品質フィルタ)
      name: "finemath-4plus"
      weight: 0.08
    - path: "loubnabnl/github-code-more-filtering"  # 多言語 GitHub コード (32 言語)
      text_column: "code"
      weight: 0.10
    - path: "OpenCoder-LLM/opc-fineweb-code-corpus"  # コード解説系 web 文書
      weight: 0.05
  streaming: true
  shuffle_buffer: 2000
  context_length: 8192          # bytes
  num_workers: 0                # 正確 resume は単一プロセス前提
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 (BitNet training tips: 高めの LR が安定して効く) ----
optim:
  optimizer: bnb_adamw_8bit     # choices: lion | bnb_adamw_8bit | adamw_fused
  lr: 8.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.1            # lr 下限 = ピークの 10% (0 で従来の完全減衰)
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 200000

# ---- スループット ----
speed:
  precision: bf16               # choices: bf16 | fp16 | fp32
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true           # 固定 pad で形状固定なので ON 可 (compute_patch_starts は対象外)
  compile_mode: default         # choices: default | reduce-overhead | max-autotune
  micro_batch_size: 1           # compile ON はこれが上限 (peak 16.4GiB 実測。2 は溢れる)
  grad_accum_steps: 64          # 実効バッチ 64 seq 相当 (= 524k bytes/update, static 版と同じ)

checkpoint:
  dir: ./checkpoints/arbor2_1b_8k_entropy
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000
  async_save: false

# ---- checkpoint 時のサンプル生成 (checkpoint dir に samples.txt を保存) ----
sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
    - "def fibonacci(n):"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 50
  best_ema_decay: 0.98
