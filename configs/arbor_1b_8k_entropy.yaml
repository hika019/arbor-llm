# Arbor v2 1B / 8192 bytes 本走の entropy patching 版 (BLT 本命方式)
#
# 前提: configs/entropy_lm.yaml の ByteLM 学習が完了していること
#       (checkpoints/entropy_lm/final = step 50000, train EMA ~1.1 nats/byte)。
# 新規:   python -m src.train.train --config configs/arbor_1b_8k_entropy.yaml
# 再開:   python -m src.train.train --config configs/arbor_1b_8k_entropy.yaml --resume latest
#
# static 版 (arbor_1b_8k.yaml) との違いは patching のみ。動的モードは global 側を
# max_bytes / min_patch_len の worst-case に固定 pad して回す。
# 実 patch 数はデータに依存するため、bytes/patch, patches/seq, max_patch/seq,
# patch_headroom をログで見ながら、新規 run では model.max_patches を詰められる。
#
# 速度/品質バランスの実測 (RTX 4090 / WSL2, 窓 attention + compile ON, 定常値):
#   min2/micro1: 24.3k bytes/s, 17.5GiB, code patch 3.0B (最細)        → 200k ≈ 48 日
#   min3/micro2: 43.3k bytes/s, 20.5GiB, code patch 3.9B (法令は min2 と同一)→ 27 日  ★採用
#   min4/micro2: 54.0k bytes/s, 18.9GiB, code patch 5.2B (粗い)         → 22 日
# min3 を採用 (速度ほぼ2倍で patch 粒度は最細に近い。性能>速度方針)。さらに速度が
# 要るなら min_patch_len: 4 (+ micro2 維持) で 54k/22 日。
#
# 注1: micro2 は min2 だと VRAM 溢れ。min3 以上 (global 系列短縮) で初めて収まる。
# 注2: compile_mode: max-autotune は逆効果 (step 330-355 実測 24k bytes/s、
#      rolling 表示も 14k bytes/s 前後まで落ち、default の定常 ~46k bytes/s を下回る)。
#      autotune 候補探索中にエラー風ログが出ること自体はありうるが、本構成では
#      速度面の採用理由が無い。
# 注3: torch_compile と gradient_checkpointing の併用は torch 2.5 で backward が NaN
#      になるため train.py が起動時に弾く。OOM 時は compile を犠牲にして
#      gradient_checkpointing: true + torch_compile: false にする。

run_name: arbor2_1b_8k_entropy
seed: 42

model:
  vocab_size: 260               # 256 bytes + 特殊 4 (BOE/BOS/EOS/PAD)
  patching_mode: entropy        # choices: static | space | entropy
  min_patch_len: 3              # これ未満では区切らない (worst-case patches = ceil(8192/3) = 2731)
  max_patch_len: 16             # これに達したら強制区切り
  entropy_threshold: 2.0        # 次バイト H (nats)。実効粒度は bytes/patch ログで確認する
  entropy_model:                # ByteLM の構成 (entropy_lm.yaml の model 節と一致させる)
    vocab_size: 260
    max_bytes: 32768
    hidden_size: 512
    num_heads: 8
    num_kv_heads: 4
    intermediate_size: 1536
    num_hidden_layers: 6
    rope_theta: 10000.0
    bitnet: false
  entropy_model_ckpt: ./checkpoints/entropy_lm/final   # 初回構築時に重みを読む (凍結同梱)
  max_bytes: 8192               # 学習 context (bytes)
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4               # GQA
  intermediate_size: 5632       # ReLU² gated FFN
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 500000.0
  norm_eps: 1.0e-5
  bitnet: true
  gradient_checkpointing: false # OOM 時のみ true

# ---- データ: static 版と同一混合 (ByteLM はこの上位集合で学習済み) ----
data:
  sources:
    - id: fineweb2_ja
      path: "HuggingFaceFW/fineweb-2"   # 日本語 web
      name: "jpn_Jpan"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.49
    - id: wikipedia_ja
      path: "wikimedia/wikipedia"
      name: "20231101.ja"
      revision: main
      license_policy: "CC BY-SA/GFDL attribution requirements"
      weight_bytes: 0.07
    - id: aozora_modern
      path: "globis-university/aozorabunko-clean"
      revision: main
      license_policy: "Aozora public-domain/copyright-expired texts; prefer modern kana subset"
      weight_bytes: 0.02
      max_epochs: 3
    - id: japan_law
      path: "y2lan/japan-law"           # 法令 (条文体。小規模)
      text_column: "body"
      revision: main
      license_policy: "Japanese government legal text terms"
      weight_bytes: 0.02
      max_epochs: 5
    - id: fineweb_edu_en
      path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.12
    - id: fineweb_en
      path: "HuggingFaceFW/fineweb"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.05
    - id: finemath_4plus
      path: "HuggingFaceTB/finemath"    # 数学 (web 由来, 高品質フィルタ)
      name: "finemath-4plus"
      revision: main
      license_policy: "dataset card terms; math web mixture"
      weight_bytes: 0.06
    - id: github_code_filtered
      path: "loubnabnl/github-code-more-filtering"  # license/generated/vendor/secret/dup filter 前提
      text_column: "code"
      revision: main
      license_policy: "per-file licenses only; exclude generated/vendor/secrets/duplicates"
      weight_bytes: 0.15
    - id: opc_code_web
      path: "OpenCoder-LLM/opc-fineweb-code-corpus"  # コード解説系 web 文書
      revision: main
      license_policy: "dataset card terms; code/web mixture"
      weight_bytes: 0.02
  streaming: true
  packing: document
  eos_token_id: 2
  pad_token_id: 3
  shuffle_buffer: 2000
  context_length: 8192          # bytes
  num_workers: 0                # 正確 resume は単一プロセス前提
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 (BitNet training tips: 高めの LR が安定して効く) ----
optim:
  optimizer: bnb_adamw_8bit     # choices: lion | bnb_adamw_8bit | adamw_fused
  lr: 8.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.1            # lr 下限 = ピークの 10% (0 で従来の完全減衰)
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 200000

# ---- スループット ----
speed:
  precision: bf16               # choices: bf16 | fp16 | fp32
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true           # 固定 pad で形状固定なので ON 可 (compute_patch_starts は対象外)
  compile_mode: default         # max-autotune は逆効果 (上部コメント参照)。default が最速
  cuda_prefetch: true           # 次 batch の H2D 転送を別 CUDA stream で先行
  bitnet_weight_cache: auto     # 実験的CUDA kernelなし。BitNetのforward用量子化重みをstep間で再利用
  bitnet_weight_cache_gib: 1.25
  bitnet_weight_cache_min_numel: 65536
  sync_each_step: false         # 毎 step synchronize しない (ログ/保存時の scalar 化で同期)
  micro_batch_size: 2           # min3 で global 系列が縮み micro2 が収まる (peak 20.5GiB 実測)
  grad_accum_steps: 32          # 実効バッチ 64 seq 相当 (= 524k bytes/update, static 版と同じ)

validation:
  enabled: true
  max_batches: 16
  micro_batch_size: 2
  domains:
    ja_web:
      source: "HuggingFaceFW/fineweb-2"
      name: "jpn_Jpan"
      revision: main
      split: train
      skip_samples: 200000
    wikipedia_ja:
      source: "wikimedia/wikipedia"
      name: "20231101.ja"
      revision: main
      split: train
      skip_samples: 20000
    english:
      source: "HuggingFaceFW/fineweb-edu"
      revision: main
      split: train
      skip_samples: 200000
    math:
      source: "HuggingFaceTB/finemath"
      name: "finemath-4plus"
      revision: main
      split: train
      skip_samples: 20000
    code:
      source: "loubnabnl/github-code-more-filtering"
      text_column: "code"
      revision: main
      split: train
      skip_samples: 20000

checkpoint:
  dir: ./checkpoints/arbor2_1b_8k_entropy
  save_every_steps: 1500
  keep_last_k: 3
  keep_every_n_steps: 10000
  async_save: false

# ---- checkpoint 時のサンプル生成 (checkpoint dir に samples.txt を保存) ----
sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
    - "def fibonacci(n):"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42

logging:
  wandb_project: arbor-llm
  log_every_steps: 25
  throughput_window: 50
  steady_after_steps: 50
  profile_sections_every_steps: 0
  best_ema_decay: 0.98
