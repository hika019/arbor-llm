# Arbor v2 1B / 8192 bytes UTF-8 patching + 日本語自然文寄せ data mix 実験版
#
# 新規:   python -m src.train.train --config configs/arbor_1b_8k_utf8_mix.yaml
# 再開:   python -m src.train.train --config configs/arbor_1b_8k_utf8_mix.yaml --resume latest
#
# 8192 bytes ≈ 2k BPE トークン等価 (日本語 ~2,700 文字)。static patching (8 bytes/patch)
# なので global は 1024 patches。実効バッチは 64 seq = 524k bytes/update。

run_name: arbor2_1b_8k_utf8_mix
seed: 42

model:
  vocab_size: 260               # 256 bytes + 特殊 4 (BOE/BOS/EOS/PAD)
  patching_mode: utf8           # choices: static | utf8 | space | entropy
  patch_size: 8                 # static 用。utf8 では未使用
  min_patch_len: 8
  max_patch_len: 12
  max_patches: 1024
  max_bytes: 8192               # 学習 context (bytes) = 1024 patches
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4               # GQA
  intermediate_size: 5632       # ReLU² gated FFN
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 500000.0
  norm_eps: 1.0e-5
  bitnet: true
  gradient_checkpointing: false # OOM 時のみ true

# ---- データ (streaming 前提; 一括ロードは禁止) ----
# weight_bytes は行選択確率ではなく、document packing 後の実測 byte 比率に近づくよう
# ByteStreamDataset 側で byte-aware に混合する。
data:
  sources:
    - id: fineweb2_ja
      path: "HuggingFaceFW/fineweb-2"   # 日本語 web
      name: "jpn_Jpan"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.599
      text_filter:
        preset: ja_web_v1
    - id: wikipedia_ja
      path: "wikimedia/wikipedia"
      name: "20231101.ja"
      revision: main
      license_policy: "CC BY-SA/GFDL attribution requirements"
      weight_bytes: 0.05
    - id: aozora_modern
      path: "globis-university/aozorabunko-clean"
      revision: main
      license_policy: "Aozora public-domain/copyright-expired texts; prefer modern kana subset"
      weight_bytes: 0.05
      max_epochs: 5
    - id: japan_law
      path: "y2lan/japan-law"           # 法令 (条文体。小規模)
      text_column: "body"
      revision: main
      license_policy: "Japanese government legal text terms"
      weight_bytes: 0.001
      max_epochs: 1
    - id: fineweb_edu_en
      path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.11
    - id: fineweb_en
      path: "HuggingFaceFW/fineweb"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.04
    - id: finemath_4plus
      path: "HuggingFaceTB/finemath"    # 数学 (web 由来, 高品質フィルタ)
      name: "finemath-4plus"
      revision: main
      license_policy: "dataset card terms; math web mixture"
      weight_bytes: 0.06
    - id: github_code_filtered
      path: "loubnabnl/github-code-more-filtering"  # license/generated/vendor/secret/dup filter 前提
      text_column: "code"
      revision: main
      license_policy: "per-file licenses only; exclude generated/vendor/secrets/duplicates"
      weight_bytes: 0.07
    - id: opc_code_web
      path: "OpenCoder-LLM/opc-fineweb-code-corpus"  # コード解説系 web 文書
      revision: main
      license_policy: "dataset card terms; code/web mixture"
      weight_bytes: 0.02
  streaming: true
  packing: document
  eos_token_id: 2
  pad_token_id: 3
  shuffle_buffer: 2000
  context_length: 8192          # bytes。patch_size の倍数にする
  num_workers: 0                # 正確 resume は単一プロセス前提
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 (BitNet training tips: 高めの LR が安定して効く) ----
optim:
  optimizer: bnb_adamw_8bit     # choices: lion | bnb_adamw_8bit | adamw_fused
  lr: 2.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.02            # lr 下限 = ピークの 2% (0 で従来の完全減衰)
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 200000

# ---- スループット ----
speed:
  precision: bf16               # choices: bf16 | fp16 | fp32
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true           # 静的形状なので常時 ON (初回コンパイルに数分)
  compile_mode: default         # choices: default | reduce-overhead | max-autotune
  cuda_prefetch: true           # 次 batch の H2D 転送を別 CUDA stream で先行
  bitnet_weight_cache: off     # 実験的CUDA kernelなし。BitNetのforward用量子化重みをstep間で再利用
  bitnet_weight_cache_gib: 1.25
  bitnet_weight_cache_min_numel: 65536
  sync_each_step: false         # 毎 step synchronize しない (ログ/保存時の scalar 化で同期)
  micro_batch_size: 2           # patch_size 8 で global 系列が半減するため 2 を本命にする
  grad_accum_steps: 32          # 実効バッチ 64 seq 相当 (= 524k bytes/update)。
                                # それでも溢れる時は gradient_checkpointing: true + torch_compile: false
                                # (compile×ckpt 併用は torch2.5 で NaN になるため train.py が弾く)

validation:
  enabled: true
  max_batches: 16
  micro_batch_size: 2
  domains:
    ja_web:
      source: "HuggingFaceFW/fineweb-2"
      name: "jpn_Jpan"
      revision: main
      split: train
      skip_samples: 200000
    wikipedia_ja:
      source: "wikimedia/wikipedia"
      name: "20231101.ja"
      revision: main
      split: train
      skip_samples: 20000
    english:
      source: "HuggingFaceFW/fineweb-edu"
      revision: main
      split: train
      skip_samples: 200000
    math:
      source: "HuggingFaceTB/finemath"
      name: "finemath-4plus"
      revision: main
      split: train
      skip_samples: 20000
    code:
      source: "loubnabnl/github-code-more-filtering"
      text_column: "code"
      revision: main
      split: train
      skip_samples: 20000

checkpoint:
  dir: ./checkpoints/arbor2_1b_8k_utf8_mix
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000
  async_save: false

# ---- checkpoint 時のサンプル生成 (checkpoint dir に samples.txt を保存) ----
sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
    - "def fibonacci(n):"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42

probes:
  enabled: true
  items:
    - name: ja_seasons
      prompt: "日本には春、夏、秋、冬という四つの季節があり、"
      target: "それぞれに異なる気候と風景を楽しむことができる。"
      bad_targets:
        - "あっという間においしくなった。"
        - "天然記念物になるという。"
    - name: ja_buttons
      prompt: "この装置には赤、青、緑、黄色という四つのボタンがあり、"
      target: "それぞれに異なる機能が割り当てられている。"
      bad_targets:
        - "あっという間においしくなった。"
        - "天然記念物になるという。"

logging:
  wandb_project: arbor-llm
  log_every_steps: 20
  throughput_window: 50
  byte_kind_metrics: true
  best_ema_decay: 0.98
