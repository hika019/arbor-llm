# Arbor-LLM 1B (BLT + BitNet b1.58) 学習設定

run_name: arbor_1b_v0
seed: 42

# ---- モデル (Global Latent Transformer; BLT 全体は別途構築) ----
model:
  vocab_size: 260           # 256 バイト + 特殊トークン少数
  hidden_size: 2048
  intermediate_size: 5632   # FFN: squared ReLU
  num_hidden_layers: 22     # BitNet 2B4T=24 を 1B 用に縮小
  num_attention_heads: 16
  num_key_value_heads: 4    # GQA
  max_position_embeddings: 2048
  rope_theta: 500000.0
  use_flash_attention: true
  gradient_checkpointing: true
  bitlinear_in_global: true   # Global Latent のみ BitLinear 化
  fp_in_local: true           # Local Encoder/Decoder は FP 維持

# ---- データ (streaming 前提; 一括ロードは禁止) ----
data:
  source: "HuggingFaceFW/fineweb-edu"
  streaming: true             # メモリに全部載せない
  shuffle_buffer: 10000       # streaming shuffle のバッファ件数
  context_length: 2048        # bytes
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 ----
optim:
  optimizer: bnb_adamw_8bit   # bitsandbytes 8bit Adam (state を 1/4 に圧縮)
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 2000
  total_steps: 200000

# ---- スループット最適化 ----
speed:
  precision: bf16             # マスター重みも BF16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true
  compile_mode: max-autotune  # 静的 shape 前提
  micro_batch_size: 4
  grad_accum_steps: 16        # 実効バッチ = 64
  flash_attention: true
  fused_rmsnorm: true
  fused_swiglu: false         # FFN は squared ReLU なので未使用

# ---- チェックポイント (外部保存、中断/再開可) ----
checkpoint:
  dir: ./checkpoints
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000   # 長期保存は 1万 step 毎
  async_save: true            # 学習スレッドをブロックしない

# ---- ログ ----
logging:
  wandb_project: arbor-llm
  log_every_steps: 20
  throughput_window: 50       # tokens/sec を直近 N step で平均
