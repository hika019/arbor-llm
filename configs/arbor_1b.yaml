# Arbor-LLM 1B (BLT + BitNet b1.58) 学習設定

run_name: arbor_1b_v0
seed: 42

# ---- モデル (Global Latent Transformer; BLT 全体は別途構築) ----
model:
  vocab_size: 260           # 256 バイト + 特殊トークン少数
  hidden_size: 2048
  intermediate_size: 5632   # FFN: squared ReLU
  num_hidden_layers: 22     # BitNet 2B4T=24 を 1B 用に縮小
  num_attention_heads: 16
  num_key_value_heads: 4    # GQA
  max_position_embeddings: 2048
  rope_theta: 500000.0
  use_flash_attention: true
  gradient_checkpointing: true
  bitlinear_in_global: true   # Global Latent のみ BitLinear 化
  fp_in_local: true           # Local Encoder/Decoder は FP 維持

# ---- データ (streaming 前提; 一括ロードは禁止) ----
# 日本語主軸の混合 (2026-06-03): 日本語 60% + 英語 40%(うち news 15%).
# weight は確率に正規化し interleave_datasets で行レベルに混合 (byte_dataset.py).
# 全ソース smoke test 済み (認証不要 streaming OK). バイト直なので vocab 変更不要.
data:
  sources:
    - path: "HuggingFaceFW/fineweb-2"   # 日本語 web (NHK 等 news 含む). 高品質
      name: "jpn_Jpan"
      weight: 0.60
    - path: "vblagoje/cc_news"          # 英語 news (CommonCrawl News)
      weight: 0.15
    - path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      weight: 0.25
  streaming: true             # メモリに全部載せない
  shuffle_buffer: 2000        # 複数ソース分のバッファを持つため 1ソースより縮小 (RAM 17GB)
  context_length: 2048        # bytes
  num_workers: 0              # RAM 制約: num_workers>0 は persistent_workers でバッファ複製→枯渇
  prefetch_factor: 4          # num_workers>0 時のみ有効 (現状 num_workers=0 で無視)
  pin_memory: true

# ---- 最適化 ----
optim:
  optimizer: bnb_adamw_8bit   # bitsandbytes 8bit Adam (state を 1/4 に圧縮)
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 2000
  total_steps: 200000

# ---- スループット最適化 ----
speed:
  precision: bf16             # マスター重みも BF16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true         # compile 有効. 初回のみコンパイル (以降キャッシュ, 再起動も inductor disk cache で短縮)
  compile_mode: default       # bench: max-autotune は default 比 +3%のみ・autotune遅いので default
  compile_dynamic: true       # 1B本走実測: static は patch_lengths 形状(~200種)で recompile地獄→cache64溢れ→step20未到達. 形状非依存の dynamic に確定 (2026-06-03)
  dynamo_cache_size_limit: 64
  micro_batch_size: 8         # bench: compile=default bs=8 で 59.6k tok/s / 11.1GB (余裕大)
  grad_accum_steps: 8         # 実効バッチ = 64
  flash_attention: true
  fused_rmsnorm: true
  fused_swiglu: false         # FFN は squared ReLU なので未使用

# ---- チェックポイント (外部保存、中断/再開可) ----
checkpoint:
  dir: ./checkpoints
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000   # 長期保存は 1万 step 毎
  async_save: true            # 学習スレッドをブロックしない

# ---- ログ ----
logging:
  wandb_project: arbor-llm
  log_every_steps: 20
  throughput_window: 50       # tokens/sec を直近 N step で平均
