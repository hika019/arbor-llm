# Arbor v2 1B (バイトレベル階層 Transformer × BitNet b1.58) 学習設定
#
# 新規:   python -m src.train.train --config configs/arbor_1b.yaml
# 再開:   python -m src.train.train --config configs/arbor_1b.yaml --resume latest
#
# 約 0.95B params。静的 patching (9 bytes/patch) で形状固定 → torch.compile 常時 ON。
# 8190 bytes ≈ 8k context。日本語ではおおむね 3 文字/patch、global は 910 patches。

run_name: arbor2_1b
seed: 42

model:
  vocab_size: 260               # 256 bytes + 特殊 4 (BOE/BOS/EOS/PAD)
  patching_mode: static         # choices: static | space | entropy
  patch_size: 9                 # 1 patch = 9 bytes (静的)
  max_bytes: 8190               # 学習 context (bytes) = 910 patches
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4               # GQA
  intermediate_size: 5632       # ReLU² gated FFN
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 500000.0
  norm_eps: 1.0e-5
  bitnet: true                  # false で全 Linear を nn.Linear に (比較実験用)
  gradient_checkpointing: false # 活性が小さいので不要。OOM 時のみ true

# ---- データ (streaming 前提; 一括ロードは禁止) ----
# 日本語主軸の混合: 日本語 60% + 英語 40% (うち news 15%)
data:
  sources:
    - path: "HuggingFaceFW/fineweb-2"   # 日本語 web (NHK 等 news 含む)
      name: "jpn_Jpan"
      weight: 0.60
    - path: "vblagoje/cc_news"          # 英語 news (CommonCrawl News)
      weight: 0.15
    - path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      weight: 0.25
  streaming: true
  shuffle_buffer: 2000
  context_length: 8190          # bytes。patch_size の倍数にする
  num_workers: 0                # 正確 resume は単一プロセス前提
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 (BitNet training tips: 高めの LR が安定して効く) ----
optim:
  optimizer: bnb_adamw_8bit     # choices: lion | bnb_adamw_8bit | adamw_fused
  lr: 8.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.1            # lr 下限 = ピークの 10%
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 200000

# ---- スループット ----
speed:
  precision: bf16               # choices: bf16 | fp16 | fp32
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true           # 静的形状なので常時 ON (初回コンパイルに数分)
  compile_mode: default         # choices: default | reduce-overhead | max-autotune
  micro_batch_size: 2           # p9 で global 系列 910。OOM 時は 1 に下げて accum を 64 へ
  grad_accum_steps: 32          # 実効バッチ 64 seq 相当 (= 524k bytes/update)

checkpoint:
  dir: ./checkpoints/arbor2_1b
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000
  async_save: false

# ---- checkpoint 時のサンプル生成 (checkpoint dir に samples.txt を保存) ----
sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42                      # 固定すると step 間で同条件の品質比較ができる

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 50
  best_ema_decay: 0.98          # best 判定に使う train loss EMA (validation best ではない)
