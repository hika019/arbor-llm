# Arbor v2 1B (バイトレベル階層 Transformer × BitNet b1.58) 学習設定
#
# 新規:   python -m src.train.train --config configs/arbor_1b.yaml
# 再開:   python -m src.train.train --config configs/arbor_1b.yaml --resume latest
#
# 約 0.95B params。静的 patching (8 bytes/patch) で形状固定 → torch.compile 常時 ON。
# 8192 bytes ≈ 8k context。global は 1024 patches。

run_name: arbor2_1b
seed: 42

model:
  vocab_size: 260               # 256 bytes + 特殊 4 (BOE/BOS/EOS/PAD)
  patching_mode: static         # choices: static | space | entropy
  patch_size: 8                 # 1 patch = 8 bytes (静的)
  max_bytes: 8192               # 学習 context (bytes) = 1024 patches
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4               # GQA
  intermediate_size: 5632       # ReLU² gated FFN
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 500000.0
  norm_eps: 1.0e-5
  bitnet: true                  # false で全 Linear を nn.Linear に (比較実験用)
  gradient_checkpointing: false # 活性が小さいので不要。OOM 時のみ true

# ---- データ (streaming 前提; 一括ロードは禁止) ----
# 8K 本走と同じ byte 比率・document packing。cc_news / cc100-ja は使わない。
data:
  sources:
    - id: fineweb2_ja
      path: "HuggingFaceFW/fineweb-2"
      name: "jpn_Jpan"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.49
    - id: wikipedia_ja
      path: "wikimedia/wikipedia"
      name: "20231101.ja"
      revision: main
      license_policy: "CC BY-SA/GFDL attribution requirements"
      weight_bytes: 0.07
    - id: aozora_modern
      path: "globis-university/aozorabunko-clean"
      revision: main
      license_policy: "Aozora public-domain/copyright-expired texts; prefer modern kana subset"
      weight_bytes: 0.02
      max_epochs: 3
    - id: japan_law
      path: "y2lan/japan-law"
      text_column: "body"
      revision: main
      license_policy: "Japanese government legal text terms"
      weight_bytes: 0.02
      max_epochs: 5
    - id: fineweb_edu_en
      path: "HuggingFaceFW/fineweb-edu"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.12
    - id: fineweb_en
      path: "HuggingFaceFW/fineweb"
      revision: main
      license_policy: "dataset card terms; web crawl mixture"
      weight_bytes: 0.05
    - id: finemath_4plus
      path: "HuggingFaceTB/finemath"
      name: "finemath-4plus"
      revision: main
      license_policy: "dataset card terms; math web mixture"
      weight_bytes: 0.06
    - id: github_code_filtered
      path: "loubnabnl/github-code-more-filtering"
      text_column: "code"
      revision: main
      license_policy: "per-file licenses only; exclude generated/vendor/secrets/duplicates"
      weight_bytes: 0.15
    - id: opc_code_web
      path: "OpenCoder-LLM/opc-fineweb-code-corpus"
      revision: main
      license_policy: "dataset card terms; code/web mixture"
      weight_bytes: 0.02
  streaming: true
  packing: document
  eos_token_id: 2
  pad_token_id: 3
  shuffle_buffer: 2000
  context_length: 8192          # bytes。patch_size の倍数にする
  num_workers: 0                # 正確 resume は単一プロセス前提
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化 (BitNet training tips: 高めの LR が安定して効く) ----
optim:
  optimizer: bnb_adamw_8bit     # choices: lion | bnb_adamw_8bit | adamw_fused
  lr: 8.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.1            # lr 下限 = ピークの 10%
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 200000

# ---- スループット ----
speed:
  precision: bf16               # choices: bf16 | fp16 | fp32
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true           # 静的形状なので常時 ON (初回コンパイルに数分)
  compile_mode: default         # choices: default | reduce-overhead | max-autotune
  cuda_prefetch: true           # 次 batch の H2D 転送を別 CUDA stream で先行
  sync_each_step: false         # 毎 step synchronize しない (ログ/保存時の scalar 化で同期)
  micro_batch_size: 2           # p8 で global 系列 1024。OOM 時は 1 に下げて accum を 64 へ
  grad_accum_steps: 32          # 実効バッチ 64 seq 相当 (= 524k bytes/update)

checkpoint:
  dir: ./checkpoints/arbor2_1b
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 10000
  async_save: false

# ---- checkpoint 時のサンプル生成 (checkpoint dir に samples.txt を保存) ----
sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42                      # 固定すると step 間で同条件の品質比較ができる

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 50
  best_ema_decay: 0.98          # best 判定に使う train loss EMA (validation best ではない)
