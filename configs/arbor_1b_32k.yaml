# Arbor v2 1B / 32768 bytes 長コンテキスト拡張 (continued pretraining)
#
# 前提: configs/arbor_1b_8k.yaml の本走が完了していること。
# 開始:
#   python -m src.train.train --config configs/arbor_1b_32k.yaml \
#       --init-from ./checkpoints/arbor2_1b_8k/final
# 再開:
#   python -m src.train.train --config configs/arbor_1b_32k.yaml --resume latest
#
# --init-from は重みだけ引き継ぎ、step/optimizer/scheduler は新規
# (--resume だと 8k run の step=200000 とスケジューラまで復元されてしまう)。
# RoPE バッファは非永続なので max_bytes / rope_theta の変更はロードに影響しない。
#
# 32768 bytes ≈ 8k BPE トークン等価 (日本語 ~11,000 文字)。Llama 3.1 系と同じく
# rope_theta を引き上げ (500k → 2M)、長文書を多めにした混合で短く追加学習する。
# step 数は本走の 10% (20k step ≈ 2.6B bytes)。

run_name: arbor2_1b_32k
seed: 42

model:
  vocab_size: 260
  patching_mode: static
  patch_size: 4
  max_bytes: 32768              # 学習 context (bytes) = 8192 patches
  # ---- global (patch 階層, BitLinear) ----
  hidden_size: 2048
  num_heads: 16
  num_kv_heads: 4
  intermediate_size: 5632
  num_hidden_layers: 20
  # ---- local (byte 階層, BitLinear) ----
  local_hidden_size: 768
  local_num_heads: 12
  local_num_kv_heads: 12
  local_intermediate_size: 2048
  num_local_encoder_layers: 2
  num_local_decoder_layers: 4
  # ---- 共通 ----
  rope_theta: 2000000.0         # 8k→32k 拡張: 4 倍 (NTK 流の theta スケーリング)
  norm_eps: 1.0e-5
  bitnet: true
  gradient_checkpointing: false # T=32768 で OOM するなら true

# ---- データ: 長文書 (法令 / code / edu / math) を 8k 本走より厚めに。短い news は外す ----
# 日本語 0.60 は本走 (arbor_1b_8k.yaml) と同じ方針。法令は 1 文書が長く 32k 向き。
data:
  sources:
    # ---- 日本語 0.60 ----
    - path: "HuggingFaceFW/fineweb-2"
      name: "jpn_Jpan"
      weight: 0.52
    - path: "y2lan/japan-law"               # 法令: 長文書 (小規模だが all_exhausted で循環)
      text_column: "body"
      weight: 0.08
    # ---- 英語 0.12 ----
    - path: "HuggingFaceFW/fineweb-edu"
      weight: 0.12
    # ---- code / math 0.28 ----
    - path: "HuggingFaceTB/finemath"
      name: "finemath-4plus"
      weight: 0.10
    - path: "loubnabnl/github-code-more-filtering"  # 多言語 GitHub コード (ファイル単位で長い)
      text_column: "code"
      weight: 0.13
    - path: "OpenCoder-LLM/opc-fineweb-code-corpus"
      weight: 0.05
  streaming: true
  shuffle_buffer: 2000
  context_length: 32768
  num_workers: 0
  prefetch_factor: 4
  pin_memory: true

# ---- 最適化: continued pretraining なので低め LR で短く ----
optim:
  optimizer: bnb_adamw_8bit
  lr: 1.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.1            # lr 下限 = ピークの 10% (0 で従来の完全減衰)
  decay_end_ratio: 0.8         # 総 step の 80% で下限到達、残りは下限で一定
  warmup_steps: 200
  total_steps: 20000

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: true
  compile_mode: default
  micro_batch_size: 1           # 32k bytes/micro
  grad_accum_steps: 4           # 実効バッチ 131k bytes/update (8k 本走と同じ)

checkpoint:
  dir: ./checkpoints/arbor2_1b_32k
  save_every_steps: 1000
  keep_last_k: 3
  keep_every_n_steps: 5000
  async_save: false

sampling:
  enabled: true
  prompts:
    - "日本の四季は"
    - "The most important thing in life is"
    - "def fibonacci(n):"
  max_new_bytes: 100
  temperature: 0.8
  top_p: 0.95
  seed: 42

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 50
  best_ema_decay: 0.98
