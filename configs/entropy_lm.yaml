# entropy patching 用の小型バイト LM (ByteLM) の学習設定
# 使い方:
#   python -m src.train.train --config configs/entropy_lm.yaml
#   -> checkpoints/entropy_lm/latest を arbor 側の model.entropy_model_ckpt に指定
#
# データ混合は本走 (arbor_1b_8k.yaml) ベース + 日英の文体多様化 (下記)。
# max_bytes は本体の max_bytes 以上にすること (next_byte_entropy は本体の
# 入力列を一発で通すため、RoPE バッファが本体の context をカバーする必要がある)。
# 32768 にしてあるので 32k 拡張 run でもそのまま使える。ただし学習 context は
# 8192 なので位置 8192 以降は RoPE 外挿になる (entropy 境界は局所文脈で決まる
# ためほぼ無害だが、32k で entropy patching を本気で使うなら context_length:
# 32768 で再学習するのが確実)。

run_name: entropy_lm
seed: 2

model:
  arch: byte_lm             # 小型 causal バイト LM (Arbor 本体ではない)
  vocab_size: 260
  max_bytes: 32768          # 本体 (8k 本走 / 32k 拡張) の max_bytes 以上にする
  hidden_size: 512
  num_heads: 8
  num_kv_heads: 4
  intermediate_size: 1536
  num_hidden_layers: 6
  rope_theta: 10000.0
  bitnet: false             # 境界判定用なので FP の通常 Transformer
  gradient_checkpointing: false

# 本走 (arbor_1b_8k.yaml) の混合の上位集合: ByteLM はトークナイザ相当で
# 本体学習開始後は差し替え不可なので、文体カバレッジは広めに取る
# (日本語: 現代web/口語/書籍・古典/百科事典/法令、英語: edu/古典書籍/news、
#  code は多言語 GitHub)。
# 混合を変えたら resume せず新規学習すること (dataloader 状態が合わなくなる)。
data:
  sources:
    # ---- 日本語 0.60 ----
    - path: "HuggingFaceFW/fineweb-2"   # 現代 web
      name: "jpn_Jpan"
      weight: 0.36
    - path: "range3/cc100-ja"           # web 口語 (ブログ調)
      weight: 0.07
    - path: "globis-university/aozorabunko-clean"  # 青空文庫: 書籍・古典・旧文体
      weight: 0.07
    - path: "wikimedia/wikipedia"       # 百科事典文体
      name: "20231101.ja"
      weight: 0.05
    - path: "y2lan/japan-law"           # 法令 (条文体。8.75k 件と小さいが all_exhausted で循環)
      text_column: "body"
      weight: 0.05
    # ---- 英語 0.22 ----
    - path: "HuggingFaceFW/fineweb-edu" # edu (高品質土台)
      weight: 0.12
    - path: "manu/project_gutenberg"    # 古典書籍
      split: "en"
      weight: 0.06
    - path: "vblagoje/cc_news"          # news
      weight: 0.04
    # ---- code / math 0.18 ----
    - path: "HuggingFaceTB/finemath"    # 数学
      name: "finemath-4plus"
      weight: 0.06
    - path: "loubnabnl/github-code-more-filtering"  # 多言語 GitHub コード (32 言語, parquet 非 gated)
      text_column: "code"
      weight: 0.08
    - path: "OpenCoder-LLM/opc-fineweb-code-corpus"  # コード解説系 web 文書
      weight: 0.04
  streaming: true
  shuffle_buffer: 2000
  context_length: 8192      # 本走の context に合わせる (max_bytes は buffer 上限)
  num_workers: 0
  pin_memory: true
  micro_batch_size: 4

optim:
  optimizer: adamw_fused
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: cosine_warmup
  min_lr_ratio: 0.15            # lr 下限 = ピークの 15%
  decay_end_ratio: 0.6          # 総 step の 60% で下限到達、残りは下限で一定
  warmup_steps: 1000
  total_steps: 100000

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: false
  torch_compile: true
  micro_batch_size: 8
  grad_accum_steps: 1

checkpoint:
  dir: ./checkpoints/entropy_lm
  save_every_steps: 1500
  keep_last_k: 2
  keep_every_n_steps: null
  async_save: false

sampling:
  enabled: false            # 境界判定用 LM なので生成品質は見ない

logging:
  log_every_steps: 20
  throughput_window: 20
