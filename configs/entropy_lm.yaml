# entropy patching 用の小型バイト LM (ByteLM) の学習設定
# 使い方:
#   python -m src.train.train --config configs/entropy_lm.yaml
#   -> checkpoints/entropy_lm/latest を arbor 側の model.entropy_model_ckpt に指定
#
# データ混合は本走 (arbor_1b_8k.yaml) と同じ HF 混合。
# max_bytes は本体の max_bytes 以上にすること (next_byte_entropy は本体の
# 入力列を一発で通すため、RoPE バッファが本体の context をカバーする必要がある)。
# 32768 にしてあるので 32k 拡張 run でもそのまま使える。ただし学習 context は
# 8192 なので位置 8192 以降は RoPE 外挿になる (entropy 境界は局所文脈で決まる
# ためほぼ無害だが、32k で entropy patching を本気で使うなら context_length:
# 32768 で再学習するのが確実)。

run_name: entropy_lm
seed: 42

model:
  arch: byte_lm             # 小型 causal バイト LM (Arbor 本体ではない)
  vocab_size: 260
  max_bytes: 32768          # 本体 (8k 本走 / 32k 拡張) の max_bytes 以上にする
  hidden_size: 256
  num_heads: 8
  num_kv_heads: 4
  intermediate_size: 768
  num_hidden_layers: 4
  rope_theta: 10000.0
  bitnet: false             # 境界判定用なので FP の通常 Transformer
  gradient_checkpointing: false

# 本走 (arbor_1b_8k.yaml) と同じ混合
data:
  sources:
    - path: "HuggingFaceFW/fineweb-2"   # 日本語 web
      name: "jpn_Jpan"
      weight: 0.45
    - path: "HuggingFaceFW/fineweb-edu" # 英語 edu (高品質土台)
      weight: 0.20
    - path: "vblagoje/cc_news"          # 英語 news
      weight: 0.05
    - path: "HuggingFaceTB/finemath"    # 数学
      name: "finemath-4plus"
      weight: 0.10
    - path: "codeparrot/codeparrot-clean"  # Python 実コード
      text_column: "content"
      weight: 0.12
    - path: "OpenCoder-LLM/opc-fineweb-code-corpus"  # コード解説系 web 文書
      weight: 0.08
  streaming: true
  shuffle_buffer: 2000
  context_length: 8192      # 本走の context に合わせる (max_bytes は buffer 上限)
  num_workers: 0
  pin_memory: true
  micro_batch_size: 4

optim:
  optimizer: adamw_fused
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 100
  total_steps: 5000

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: false
  torch_compile: false
  micro_batch_size: 4
  grad_accum_steps: 1

checkpoint:
  dir: ./checkpoints/entropy_lm
  save_every_steps: 500
  keep_last_k: 2
  keep_every_n_steps: null
  async_save: false

sampling:
  enabled: false            # 境界判定用 LM なので生成品質は見ない

logging:
  log_every_steps: 20
  throughput_window: 20
