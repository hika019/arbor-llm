# スモークテスト用設定: 小モデル + ローカルファイル + 数ステップ
# 目的: 学習ループ・チェックポイント・再開・eval が一通り動くことの確認.

run_name: smoke
seed: 42

model:
  vocab_size: 260
  hidden_size: 128
  intermediate_size: 256
  num_hidden_layers: 2
  num_attention_heads: 4
  num_key_value_heads: 4
  max_position_embeddings: 256
  rope_theta: 10000.0
  use_flash_attention: false
  gradient_checkpointing: false
  bitlinear_in_global: false
  fp_in_local: true

data:
  # ローカル mmap (HF download 不要). 巨大データ前提と同じストリーミング契約を踏襲.
  source: "file:./bitnet_blt_project_spec.md"
  streaming: true
  shuffle_buffer: 0
  context_length: 128
  num_workers: 0          # smoke は単一プロセスで.
  prefetch_factor: 2
  pin_memory: true
  micro_batch_size: 4
  text_column: text

optim:
  optimizer: adamw_fused  # bitsandbytes 不要のフォールバック.
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 5
  total_steps: 50

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: false    # smoke では compile しない (起動を速く)
  compile_mode: default
  micro_batch_size: 4
  grad_accum_steps: 1
  flash_attention: false
  fused_rmsnorm: false
  fused_swiglu: false

checkpoint:
  dir: ./checkpoints/smoke
  save_every_steps: 10
  keep_last_k: 2
  keep_every_n_steps: null
  async_save: false       # smoke 検証は同期保存で確実に.

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 10
