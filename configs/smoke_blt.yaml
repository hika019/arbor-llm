# 実 BLT を使う smoke. cross-attention は FlexAttention 必須なため一旦無効.
# Global Transformer のみ BitLinear 化、Local Encoder/Decoder は FP.
run_name: smoke_blt
seed: 42

model:
  backend: blt
  vocab_size: 260
  hidden_size: 128
  intermediate_size: 256
  num_hidden_layers: 2
  num_local_layers: 1
  num_attention_heads: 4
  num_key_value_heads: 4
  max_position_embeddings: 256
  patch_size: 4
  patching_mode: space
  rope_theta: 10000.0
  use_flash_attention: false
  gradient_checkpointing: false
  bitlinear_in_global: true
  fp_in_local: true

data:
  source: "file:./bitnet_blt_project_spec.md"
  streaming: true
  shuffle_buffer: 0
  context_length: 128
  num_workers: 0
  prefetch_factor: 2
  pin_memory: true
  micro_batch_size: 4
  text_column: text

optim:
  optimizer: adamw_fused
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler: cosine_warmup
  warmup_steps: 5
  total_steps: 30

speed:
  precision: bf16
  tf32_matmul: true
  cudnn_benchmark: true
  torch_compile: false
  compile_mode: default
  micro_batch_size: 4
  grad_accum_steps: 1
  flash_attention: false
  fused_rmsnorm: false
  fused_swiglu: false

checkpoint:
  dir: ./checkpoints/smoke_blt
  save_every_steps: 10
  keep_last_k: 2
  keep_every_n_steps: null
  async_save: false

logging:
  wandb_project: arbor-llm
  log_every_steps: 5
  throughput_window: 10
